<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Basanets</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --primary-blue: #3498db;
            --dark-bg: #1a1a2e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Анимированный фон с кругами */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-green);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: var(--primary-blue);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        /* Основная карточка */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary-green), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #bdc3c7;
            margin-bottom: 2rem;
        }

        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
        }

        .badge.blue {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
        }

        .cta-button {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: linear-gradient(to right, var(--primary-green), var(--primary-blue));
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .cta-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="card">
        <h1>Julia Basanets</h1>
        <div class="role">Junior DevOps Engineer</div>
        
        <p>Automate routine tasks, optimize infrastructure costs and strive for new heights!</p>

        <div class="tech-stack">
            <span class="badge">Docker</span>
            <span class="badge blue">Kubernetes</span>
            <span class="badge">Linux</span>
            <span class="badge blue">Terraform</span>
            <span class="badge">CI/CD</span>
        </div>

        <a href="mailto:kyulia0308@gmail.com" class="cta-button">Contact me</a>
    </div>

</body>
</html>
